{% extends "layout.html" %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 0;">
    <div class="glass-card slide-up" style="width: 100%; max-width: 500px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="margin-bottom: 10px;">Create Account</h2>
            <p style="color: var(--text-medium);">Join us to book services instantly</p>
        </div>

        <form action="{{ url_for('register') }}" method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label" for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="johndoe123">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required
                    placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" required placeholder="+91 98765 43210">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required
                    placeholder="Create a strong password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>

        <div style="margin-top: 20px; text-align: center;">
            <p style="color: var(--text-medium);">Already have an account? <a href="{{ url_for('login') }}"
                    style="font-weight: 600;">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
