{% extends "layout.html" %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="glass-card slide-up" style="width: 100%; max-width: 450px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="margin-bottom: 10px;">Welcome Back</h2>
            <p style="color: var(--text-medium);">Please enter your details to sign in</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required
                    placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required
                    placeholder="Enter your password">
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.9rem;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="{{ url_for('forgot_password') }}" style="color: var(--primary-light);">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <div style="margin-top: 20px; text-align: center;">
            <p style="color: var(--text-medium);">Don't have an account? <a href="{{ url_for('register') }}"
                    style="font-weight: 600;">Sign up</a></p>
        </div>

        <!-- Social Login Placeholder -->
        <div style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
            <button class="btn btn-secondary"
                style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" style="width: 20px;">
                Continue with Google
            </button>
        </div>
    </div>
</div>
{% endblock %}
