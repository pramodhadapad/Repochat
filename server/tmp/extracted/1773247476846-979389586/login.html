{% extends "layout.html" %}

{% block content %}
<div class="form-container">
    <h2 class="form-title">Login</h2>
    <form action="{{ url_for('login') }}" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required placeholder="Username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Password">
            <p style="text-align: right; margin-top: 5px; font-size: 0.9em;">
                <a href="{{ url_for('forgot_password') }}" style="color: #666;">Forgot Password?</a>
            </p>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        <p style="margin-top: 15px; text-align: center;">New Customer? <a href="{{ url_for('register') }}">Register
                Here</a></p>
    </form>
</div>
{% endblock %}
