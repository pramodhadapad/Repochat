{% extends "layout.html" %}

{% block content %}
<div class="form-container" style="max-width: 600px;">
    <h2 class="form-title">Book a Service</h2>
    <form action="{{ url_for('booking') }}" method="post">
        <div class="form-group">
            <label>Select Service</label>
            <select name="service_id" required>
                <option value="">-- Choose a Service --</option>
                {% for s in services %}
                <option value="{{ s['id'] }}" {% if selected_service and selected_service == s['id'] %}selected{%
                    endif %}>
                    {{ s['service_name'] }} (Starts ₹{{ s['price'] }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label>Preferred Date</label>
                <input type="date" name="booking_date" required min="{{ datetime.now().strftime('%Y-%m-%d') }}">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Preferred Time</label>
                <input type="time" name="booking_time" required>
            </div>
        </div>

        <div class="form-group">
            <label>Service Address</label>
            <textarea name="address" rows="3" required placeholder="Enter your full address"></textarea>
        </div>

        <div class="form-group">
            <label>Additional Notes (Problem Description)</label>
            <textarea name="notes" rows="3" placeholder="Describe the issue with your appliance..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Confirm Booking</button>
    </form>
</div>
{% endblock %}
