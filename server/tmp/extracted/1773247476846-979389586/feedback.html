{% extends "layout.html" %}
{% block content %}
<div class="form-container" style="max-width: 600px;">
    <h2 class="form-title">Service Feedback</h2>
    <form method="post">
        <div class="form-group">
            <label>Select Completed Booking</label>
            <select name="booking_id" class="form-control" required>
                {% for booking in bookings %}
                <!-- Ideally filter for completed bookings only, doing basic list here -->
                {% if booking.status == 'Completed' %}
                <option value="{{ booking._id }}">{{ booking.service.service_name if booking.service else 'Service' }}
                    ({{ booking.booking_date }})</option>
                {% endif %}
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Rating (1-5)</label>
            <select name="rating" class="form-control">
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Good</option>
                <option value="3">3 - Average</option>
                <option value="2">2 - Poor</option>
                <option value="1">1 - Terrible</option>
            </select>
        </div>
        <div class="form-group">
            <label>Comment</label>
            <textarea name="comment" class="form-control" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Feedback</button>
    </form>
</div>
{% endblock %}
