{% extends "layout.html" %}
{% block content %}
<h2>Technicians</h2>
<table class="table">
  <thead>
    <tr><th>Name</th><th>Specialization</th><th>Phone</th><th>Status</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for tech in technicians %}
    <tr>
      <td>{{ tech.name }}</td>
      <td>{{ tech.specialization }}</td>
      <td>{{ tech.phone }}</td>
      <td>{{ tech.status }}</td>
      <td><a href="{{ url_for('delete_technician', id=tech._id) }}" class="btn btn-secondary">Delete</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
<h3>Add Technician</h3>
<form method="post">
  <div class="form-group"><label>Name</label><input name="name" class="form-control" required></div>
  <div class="form-group"><label>Specialization</label><input name="specialization" class="form-control"></div>
  <div class="form-group"><label>Phone</label><input name="phone" class="form-control"></div>
  <div class="form-group"><label>Status</label><select name="status" class="form-control"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
  <button type="submit" class="btn btn-primary">Add</button>
</form>
{% endblock %}
