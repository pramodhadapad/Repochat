{% extends "layout.html" %}

{% block content %}
<div class="form-container" style="max-width: 400px; margin-top: 50px;">
    <h2 class="form-title">Forgot Password</h2>
    <p style="text-align: center; margin-bottom: 20px;">Enter your registered Email and Phone Number to verify your
        identity.</p>

    <form action="{{ url_for('forgot_password') }}" method="post">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" required placeholder="Enter your phone number">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Verify & Next</button>

        <p class="form-footer">
            Remembered? <a href="{{ url_for('login') }}">Login Here</a>
        </p>
    </form>
</div>
{% endblock %}
