{% extends "layout.html" %}

{% block content %}
<div class="form-container">
    <h2 class="form-title">Customer Registration</h2>
    <form action="{{ url_for('register') }}" method="post">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" required placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" required placeholder="Enter mobile number">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Create a password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        <p style="margin-top: 15px; text-align: center;">Already have an account? <a href="{{ url_for('login') }}">Login
                Now</a></p>
    </form>
</div>
{% endblock %}
