version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: repochat-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - repochat-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: repochat-chroma
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/data
    networks:
      - repochat-net

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: repochat-server
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/repochat
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      - mongodb
      - chromadb
    networks:
      - repochat-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: repochat-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - repochat-net

networks:
  repochat-net:
    driver: bridge

volumes:
  mongodb_data:
  chromadb_data:
